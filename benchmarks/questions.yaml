# Scripted Thai auditor questions for the Phase-4 exit gate + benchmark.
# Cover project documents and regulations, and the demo's high-risk stories.
questions:
  - งบประมาณโครงการถนนบ้านวัดไทร หมู่ ๔ ตำบลหัวเขา ปี ๒๕๖๘ เป็นเท่าไร และเพิ่มขึ้นจากปีก่อนกี่เปอร์เซ็นต์
  - โครงการซ่อมแซมถนนบ้านวัดไทรมีผู้รับจ้างรายเดิมชนะติดต่อกันกี่ปี
  - ราคาต่อหน่วยของถังน้ำพลาสติกขนาด ๒,๐๐๐ ลิตร ปี ๖๗ กับปี ๖๘ ต่างกันอย่างไร
  - ร้านที่ชนะการจัดซื้อถังน้ำทั้งสองปีเป็นร้านเดียวกันหรือไม่ และใช้วิธีจัดซื้อแบบใด
  - ราคาถังน้ำที่จัดซื้อสูงกว่าราคามาตรฐานครุภัณฑ์หรือไม่
  - มาตรา ๓๗ แห่งพระราชบัญญัติวินัยการเงินการคลังของรัฐ กล่าวถึงเรื่องใด
  - การแบ่งซื้อแบ่งจ้างเพื่อหลีกเลี่ยงวงเงินมีระเบียบข้อใดที่เกี่ยวข้อง
  - มีโครงการใดบ้างที่งบประมาณเพิ่มขึ้นเกินหนึ่งเท่าตัวเมื่อเทียบกับปีก่อน
  - โครงการจ้างเหมาซ่อมแซมถนนลูกรัง หมู่ ๑ บ้านเขาคีรี มีเอกสารประกอบอะไรบ้าง
  - วิธีจัดซื้อจัดจ้างแบบเฉพาะเจาะจงใช้ได้ในกรณีใดตามระเบียบ
