# =============================================================================
# Mission 3 — Application Zone stack (always-on; never depends on LANTA)
# traefik, postgres+pgvector, redis, minio, clickhouse, langfuse v3, TEI x2
# Configure via .env (copy from .env.example).
# =============================================================================

services:
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - --ping=true
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LANGFUSE_DB: ${LANGFUSE_DB}
      TZ: ${TZ}
    ports:
      - "5432:5432"   # dev convenience; remove on a public VM
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # noeviction is required by Langfuse v3 (its queue lives here)
    command: >
      redis-server --requirepass ${REDIS_AUTH} --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_AUTH} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    # Pre-create buckets as directories before the server starts
    entrypoint: >
      sh -c 'mkdir -p /data/langfuse /data/${MINIO_BUCKET_CORPUS} /data/${MINIO_BUCKET_ARTIFACTS}
      && minio server /data --address ":9000" --console-address ":9001"'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      # 127.0.0.1 explicitly — busybox wget resolves localhost to ::1, where ClickHouse doesn't listen
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: &langfuse-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${LANGFUSE_DB}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_AUTH}
      TELEMETRY_ENABLED: "false"
      NEXTAUTH_URL: http://langfuse.${APP_DOMAIN}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
    ports:
      - "3000:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.langfuse.rule=Host(`langfuse.${APP_DOMAIN}`)
      - traefik.http.routers.langfuse.entrypoints=web
      - traefik.http.services.langfuse.loadbalancer.server.port=3000
    healthcheck:
      # Next.js standalone binds to $HOSTNAME (container IP), not 127.0.0.1
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$$HOSTNAME:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *langfuse-env

  # Phase 3 read API — serves ONLY pre-computed, guardrails-validated data
  # from PostgreSQL (offline-first: fully functional with zero Slurm jobs).
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_AUTH}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3001}
      DASHBOARD_CACHE_TTL_SECONDS: ${DASHBOARD_CACHE_TTL_SECONDS:-300}
      # Bare host:port — same convention as pipelines' PIPELINES_MINIO_ENDPOINT
      BACKEND_MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_CORPUS: ${MINIO_BUCKET_CORPUS}
      TZ: ${TZ}
    ports:
      - "8080:8080"   # dev convenience; Traefik is the real entrypoint
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.services.backend.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # BGE-M3 embeddings — CPU is enough at prototype scale.
  # First start downloads weights from HF; the app VM has internet (LANTA does not).
  tei-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    # TEI CPU images are amd64-only; emulated on Apple-Silicon dev machines,
    # native on the (amd64) app VM
    platform: linux/amd64
    restart: unless-stopped
    # small max-batch keeps the fp32 warm-up memory spike sane on dev machines;
    # plenty for prototype-scale ingestion (raise on the app VM if needed)
    # 1024-token cap + auto-truncate keeps CPU warm-up/attention memory sane;
    # chunks are far shorter than this. Raise on the (amd64) app VM if needed.
    command: --model-id BAAI/bge-m3 --port 80 --max-batch-tokens 1024 --auto-truncate
    ports:
      - "8081:80"
    volumes:
      - tei_cache:/data
    environment:
      HF_HUB_CACHE: /data
    healthcheck:
      # TEI image ships no curl/wget — probe the TCP port via bash
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

  tei-rerank:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    platform: linux/amd64
    restart: unless-stopped
    command: --model-id BAAI/bge-reranker-v2-m3 --port 80 --max-batch-tokens 1024 --auto-truncate
    ports:
      - "8082:80"
    volumes:
      - tei_cache:/data
    environment:
      HF_HUB_CACHE: /data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/80"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 120s

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  tei_cache:
